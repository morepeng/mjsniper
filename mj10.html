<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MJ SNIPER v32.0 - THEORY ENHANCED</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #02050a; --panel: rgba(10, 21, 37, 0.85); 
            --cyan: #00d4ff; --bull: #00f2fe; --bear: #ff0055; 
            --border: rgba(0, 212, 255, 0.4); --gold: #f9d423; --purple: #a445b2; 
        }
        body { background: radial-gradient(circle at center, #0a1525 0%, #02050a 100%); color: #e0e6ed; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        .topbar { background: var(--panel); border-bottom: 1px solid var(--cyan); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); }
        .tab-nav { display: flex; background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--border); overflow-x: auto; }
        .tab-btn { padding: 12px 20px; border: none; background: transparent; color: #8492a6; font-size: 12px; cursor: pointer; transition: 0.4s; flex-shrink: 0; }
        .tab-btn.active { color: var(--cyan); border-bottom: 2px solid var(--cyan); text-shadow: 0 0 8px var(--cyan); font-weight: bold; }
        .layout { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .tab-content { display: none; flex: 1; overflow-y: auto; padding: 15px; flex-direction: column; gap: 12px; }
        .tab-content.active { display: flex; animation: fadeIn 0.4s ease; }
        .glass-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 15px; backdrop-filter: blur(10px); box-shadow: inset 0 0 15px rgba(0, 212, 255, 0.1); }
        .glass-card h4 { margin: 0 0 12px 0; font-size: 14px; color: var(--cyan); text-transform: uppercase; letter-spacing: 1px; border-left: 3px solid var(--cyan); padding-left: 10px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; align-items: center; }
        .val { font-weight: bold; color: var(--gold); }
        .tag { font-size: 11px; padding: 2px 6px; border-radius: 3px; background: #1c3d64; color: #fff; }
        .tag.bull { background: var(--bull); color: #000; font-weight: bold; }
        .tag.bear { background: var(--bear); color: #fff; font-weight: bold; }
        .theory-detail { font-size: 11px; line-height: 1.6; color: #b0c4de; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 6px; border-left: 3px solid var(--purple); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .btn-main { background: linear-gradient(45deg, var(--cyan), #0082ff); color: #fff; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        input { background: rgba(0,0,0,0.5); border: 1px solid var(--cyan); color: #fff; padding: 8px 15px; border-radius: 20px; width: 100px; outline: none; }
    </style>
</head>
<body>
    <header class="topbar">
        <div style="font-weight: 800; color: var(--cyan);">MJ SNIPER <span style="font-weight:300; color:#fff;">v32.0</span></div>
        <div style="display:flex; gap:10px;"><input type="text" id="top-tk" placeholder="代號"><button class="btn-main" onclick="fireSniper()">鑑定開始</button></div>
    </header>

    <nav class="tab-nav">
        <button class="tab-btn active" onclick="showTab('tab-overview', this)">📊 概覽</button>
        <button class="tab-btn" onclick="showTab('tab-tech', this)">📈 技術</button>
        <button class="tab-btn" onclick="showTab('tab-theory', this)">📚 理論強化</button>
        <button class="tab-btn" onclick="showTab('tab-smc', this)">🏦 資金</button>
        <button class="tab-btn" onclick="showTab('tab-risk', this)">⚠️ 風控</button>
    </nav>

    <div class="layout">
        <div id="tab-overview" class="tab-content active">
            <div class="glass-card" style="border-left: 5px solid var(--gold);"><h4 style="color:var(--gold);">🏁 AI 戰略決策中心</h4><div id="decision-box">待鑑定...</div></div>
            <div id="chart" style="width:100%; height:32vh; border-radius:12px; border:1px solid var(--border); background:#000;"></div>
        </div>

        <div id="tab-theory" class="tab-content">
            <div class="glass-card">
                <h4>📐 道氏理論精確鑑定 (123 / 2B 法則)</h4>
                <div class="row"><span>主要趨勢方向：</span> <span id="dow-major" class="val">--</span></div>
                <div class="row"><span>2B 假突破偵測：</span> <span id="dow-2b" class="tag">掃描中</span></div>
                <div class="theory-detail" id="dow-123-msg">正在分析高低點排列以確認 123 反轉法則...</div>
            </div>
            <div class="glass-card">
                <h4>💎 威科夫 VSA 深度鑑定 (Phase A-E)</h4>
                <div class="row"><span>當前市場階段：</span> <span id="wyk-phase" class="tag special" style="background:var(--purple);">--</span></div>
                <div class="row"><span>測試信號 (Test)：</span> <span id="wyk-test" class="val">--</span></div>
                <div class="theory-detail" id="wyk-detail-msg">正在掃描量價關係以識別吸籌/派發跡象...</div>
            </div>
        </div>

        <div id="tab-tech" class="tab-content"> <div class="glass-card"><h4>技術鑑定一次到位</h4><div id="tech-data">待鑑定...</div></div> </div>
    </div>

    <script>
        let chart, candleSeries;
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw3FtfMjvsSJB0lxXNZuW58jK9mzM6UpU4uJ8dLczWY4sIN4gl7yW9qKoi1rCc7ZA/exec".trim().replace(/\s+/g, '');

        function initChart() {
            const dom = document.getElementById('chart');
            chart = LightweightCharts.createChart(dom, {
                layout: { background: { color: '#000' }, textColor: '#8492a6' },
                grid: { vertLines: { color: 'rgba(28, 61, 100, 0.1)' }, horzLines: { color: 'rgba(28, 61, 100, 0.1)' } },
                timeScale: { borderColor: 'rgba(0, 212, 255, 0.3)', timeVisible: true }
            });
            candleSeries = chart.addCandlestickSeries({ upColor: '#00f2fe', downColor: '#ff0055', borderVisible: false });
        }

        function showTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        async function fireSniper() {
            const tk = document.getElementById('top-tk').value;
            if(!tk) return;
            try {
                const res = await fetch(`${GAS_URL}?tk=${tk.toUpperCase()}&interval=1d`);
                const d = await res.json();
                if(d.chart && d.chart.result) {
                    const r = d.chart.result[0], t = r.timestamp, q = r.indicators.quote[0];
                    let df = t.map((v,i) => ({ time: v, open: q.open[i], high: q.high[i], low: q.low[i], close: q.close[i], vol: q.volume[i] })).filter(x => x.close);
                    candleSeries.setData(df);
                    chart.timeScale().fitContent();
                    runTheoryEnhancedAnalysis(df);
                }
            } catch(e) { console.error(e); }
        }

        function runTheoryEnhancedAnalysis(df) {
            const last = df[df.length-1], prev = df[df.length-2];
            const p60 = df.slice(-60);
            const high60 = Math.max(...p60.map(x=>x.high)), low60 = Math.min(...p60.map(x=>x.low));
            
            // --- 1. 道氏理論補強 (123/2B) ---
            let is2B = last.high > high60 * 0.99 && last.close < high60 ? "⚠️ 2B 假突破預警" : "正常";
            document.getElementById('dow-major').innerText = last.close > (df.slice(-60).reduce((a,b)=>a+b.close,0)/60) ? "多頭 (Bullish)" : "空頭 (Bearish)";
            document.getElementById('dow-2b').innerText = is2B;
            document.getElementById('dow-2b').className = `tag ${is2B.includes('⚠️')?'bear':'bull'}`;
            document.getElementById('dow-123-msg').innerHTML = `● 1.趨勢線: ${last.close > (df.slice(-20).reduce((a,b)=>a+b.close,0)/20) ? '已突破' : '受阻'}<br>● 2.創高/低: 未見新低<br>● 3.確認: 等待結構突破點`;

            // --- 2. 威科夫理論補強 ---
            const support = Math.min(...df.slice(-30, -5).map(x=>x.low));
            const isSpring = last.low < support && last.close > support;
            const phase = isSpring ? "Phase C" : (last.close > high60 * 0.95 ? "Phase D/E" : "Phase B");
            document.getElementById('wyk-phase').innerText = phase;
            document.getElementById('wyk-test').innerText = isSpring ? "★ Spring (彈簧測試)" : "無明顯測試";
            document.getElementById('wyk-detail-msg').innerHTML = `● 目前階段: ${phase}<br>● VSA訊號: ${isSpring ? '發現主力洗盤吸籌跡象' : '區間震盪建立原因中'}<br>● LPS支撐: 確認中`;

            // --- 3. 戰略決策同步 ---
            document.getElementById('decision-box').innerHTML = `<span style="color:var(--gold); font-size:16px; font-weight:bold;">鑑定結論: ${phase} / ${is2B}</span><br>理論共振度: 高 | 建議依據 2B 法則設定嚴格停損。`;
        }

        window.onload = initChart;
    </script>
</body>
</html>
