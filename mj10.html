<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MJ SNIPER v30.5 - EXPERT VISUAL</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #03080f; --panel: #070e19; --cyan: #00d4ff; --bull: #00e676; --bear: #ff1744; --border: #1c3d64; --t1: #cfe0ee; --gold: #ffd700; --purple: #bf40bf; }
        body { background: var(--bg); color: var(--t1); font-family: sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { background: var(--panel); border-bottom: 2px solid var(--cyan); padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .tab-nav { display: flex; background: #0a1525; overflow-x: auto; border-bottom: 1px solid var(--border); }
        .tab-btn { padding: 12px 15px; border: none; background: none; color: #6a8da8; font-size: 13px; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { color: var(--cyan); border-bottom: 3px solid var(--cyan); font-weight: bold; }
        .layout { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .tab-content { display: none; flex: 1; overflow-y: auto; padding: 10px; flex-direction: column; gap: 10px; }
        .tab-content.active { display: flex; }

        /* 專家編排組件 */
        .chart-container { position: relative; width: 100%; height: 35vh; border: 1px solid var(--border); border-radius: 8px; background: #000; margin-bottom: 5px; }
        .chart-tools { position: absolute; top: 10px; left: 10px; z-index: 10; display: flex; gap: 5px; }
        .tf-btn { background: rgba(28, 61, 100, 0.8); color: #fff; border: 1px solid var(--cyan); padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        .tf-btn.active { background: var(--cyan); color: #000; font-weight: bold; }
        
        .visual-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 10px; }
        .radar-box { background: #0a1525; border: 1px solid var(--border); border-radius: 8px; padding: 10px; height: 220px; }
        .score-box { background: #0a1525; border: 1px solid var(--border); border-radius: 8px; padding: 10px; height: 220px; }
        
        .card { background: #0a1525; border: 1px solid var(--border); padding: 10px; border-radius: 8px; }
        .decision-banner { background: #1a1a00; border: 2px solid var(--gold); padding: 12px; border-radius: 8px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 12px; }
        .val { font-weight: bold; color: var(--gold); }
        .btn-main { background: var(--cyan); color: #000; border: none; padding: 8px 12px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        input { background: #050c14; border: 1px solid var(--cyan); color: #fff; padding: 6px; border-radius: 4px; width: 80px; }
    </style>
</head>
<body>
    <header class="topbar">
        <div style="font-weight: bold; color: var(--cyan);">🎯 MJ SNIPER AI v30.5</div>
        <div style="display:flex; gap:6px;">
            <input type="text" id="top-tk" placeholder="代號">
            <button class="btn-main" onclick="fireSniper()">⚡ 射擊</button>
        </div>
    </header>

    <nav class="tab-nav">
        <button class="tab-btn active" onclick="showTab('tab-overview', this)">📊 概覽</button>
        <button class="tab-btn" onclick="showTab('tab-tech', this)">📈 技術</button>
        <button class="tab-btn" onclick="showTab('tab-theory', this)">📚 理論</button>
        <button class="tab-btn" onclick="showTab('tab-smc', this)">🏦 資金</button>
        <button class="tab-btn" onclick="showTab('tab-macro', this)">📡 先行</button>
        <button class="tab-btn" onclick="showTab('tab-risk', this)">⚠️ 風控</button>
    </nav>

    <div class="layout">
        <div id="tab-overview" class="tab-content active">
            <div class="decision-banner" id="decision-box">請射擊鑑定標的，啟動專家形態分析...</div>
            <div class="chart-container">
                <div class="chart-tools">
                    <button class="tf-btn" onclick="changeTF('15m', this)">15M</button>
                    <button class="tf-btn active" onclick="changeTF('1d', this)">1日</button>
                    <button class="tf-btn" onclick="changeTF('1wk', this)">1周</button>
                </div>
                <div id="main-chart" style="width:100%; height:100%;"></div>
            </div>

            <div class="visual-grid">
                <div class="radar-box">
                    <canvas id="radarChart"></canvas>
                </div>
                <div class="score-box">
                    <canvas id="barChart"></canvas>
                </div>
            </div>

            <div class="card">
                <h4>💎 核心指標摘要 (v8.5 靈魂)</h4>
                <div class="row"><span>貝葉斯信心度：</span> <span id="bayes-val" class="val">--</span></div>
                <div class="row"><span>SMC 結構：</span> <span id="smc-val" class="val">--</span></div>
            </div>
        </div>
        </div>

    <script>
        let chart, candleSeries, currentTF = '1d', radarObj, barObj;
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw3FtfMjvsSJB0lxXNZuW58jK9mzM6UpU4uJ8dLczWY4sIN4gl7yW9qKoi1rCc7ZA/exec".trim().replace(/\s+/g, '');

        function initCharts() {
            // K線圖初始化
            const dom = document.getElementById('main-chart');
            chart = LightweightCharts.createChart(dom, {
                layout: { background: { color: '#000' }, textColor: '#6a8da8' },
                grid: { vertLines: { color: '#0e1f33' }, horzLines: { color: '#0e1f33' } },
                timeScale: { borderColor: '#1c3d64', timeVisible: true },
                handleScroll: true, handleScale: true
            });
            candleSeries = chart.addCandlestickSeries({ upColor: '#00e676', downColor: '#ff1744', borderVisible: false });

            // 7 因子雷達圖 (v30.5 編排)
            const ctxR = document.getElementById('radarChart').getContext('2d');
            radarObj = new Chart(ctxR, {
                type: 'radar',
                data: {
                    labels: ['趨勢', '量價', '資金', '情緒', '宏觀', '結構', '形態'],
                    datasets: [{ label: '因子強度', data: [0,0,0,0,0,0,0], backgroundColor: 'rgba(0, 212, 255, 0.2)', borderColor: '#00d4ff', borderWidth: 2 }]
                },
                options: { 
                    scales: { r: { grid: { color: '#1c3d64' }, angleLines: { color: '#1c3d64' }, pointLabels: { color: '#cfe0ee', font: { size: 10 } }, ticks: { display: false }, min: 0, max: 100 } },
                    plugins: { legend: { display: false } }, maintainAspectRatio: false
                }
            });

            // 分組得分長條圖 (v30.5 編排)
            const ctxB = document.getElementById('barChart').getContext('2d');
            barObj = new Chart(ctxB, {
                type: 'bar',
                data: {
                    labels: ['L0宏觀', 'L1趨勢', 'L2情緒', 'L3量價', 'L4結構'],
                    datasets: [{ data: [0,0,0,0,0], backgroundColor: ['#bf40bf', '#00d4ff', '#ffd700', '#00e676', '#ff1744'] }]
                },
                options: {
                    indexAxis: 'y',
                    scales: { x: { grid: { display: false }, ticks: { display: false }, max: 100 }, y: { ticks: { color: '#cfe0ee', font: { size: 10 } } } },
                    plugins: { legend: { display: false } }, maintainAspectRatio: false
                }
            });
        }

        function showTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        function changeTF(tf, btn) {
            currentTF = tf;
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            fireSniper();
        }

        async function fireSniper() {
            const tk = document.getElementById('top-tk').value;
            if(!tk) return;
            let sym = tk.toUpperCase();
            if (!isNaN(sym)) sym = (sym.length <= 4 ? sym.padStart(4,'0')+'.HK' : sym+'.TW');
            
            try {
                const res = await fetch(`${GAS_URL}?tk=${sym}&interval=${currentTF=='1wk'?'1wk':(currentTF=='15m'?'15m':'1d')}`);
                const d = await res.json();
                if(d.chart && d.chart.result) {
                    const r = d.chart.result[0], t = r.timestamp, q = r.indicators.quote[0];
                    let df = [];
                    for(let i=0; i<t.length; i++) { if(q.close[i]) df.push({ time: t[i], open: q.open[i], high: q.high[i], low: q.low[i], close: q.close[i] }); }
                    candleSeries.setData(df);
                    chart.timeScale().fitContent();
                    updateExpertUI(df);
                }
            } catch(e) { console.error(e); }
        }

        function updateExpertUI(df) {
            const last = df[df.length-1];
            const scoreTrend = Math.random() * 40 + 60; // 模擬運算
            
            // 更新決策 banner
            document.getElementById('decision-box').innerHTML = `<h3 style="color:var(--bull); margin:0;">【買入建議】貝葉斯信心: ${scoreTrend.toFixed(1)}%</h3>🚩 目標 T1: ${(last.close*1.08).toFixed(2)} | 止損: ${(last.close*0.94).toFixed(2)}`;
            
            // 更新雷達圖 (v30.5 編排)
            radarObj.data.datasets[0].data = [scoreTrend, 85, 70, 45, 90, 80, 75];
            radarObj.update();

            // 更新長條圖 (v30.5 編排)
            barObj.data.datasets[0].data = [90, 85, 45, 75, 80];
            barObj.update();

            document.getElementById('smc-val').innerText = "BOS (向上突破)";
            document.getElementById('bayes-val').innerText = scoreTrend.toFixed(1) + "%";
        }

        window.onload = initCharts;
    </script>
</body>
</html>
