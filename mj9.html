<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MJ SNIPER v25.4 - PATTERN ANALYZER</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg: #050c14; --panel: #070e19; --cyan: #00d4ff; --bull: #00e676; --bear: #ff1744; --border: #1c3d64; --t1: #cfe0ee; --gold: #ffd700; --purple: #bf40bf; }
        body { background: var(--bg); color: var(--t1); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .topbar { background: var(--panel); border-bottom: 2px solid var(--cyan); padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .layout { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .sidebar { background: var(--panel); padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid var(--border); max-height: 55vh; }
        #chart { flex: 1; background: #000; min-height: 35vh; }
        @media (min-width: 768px) { .layout { flex-direction: row; } .sidebar { width: 380px; border-bottom: none; border-right: 1px solid var(--border); max-height: 100%; } }
        .card { background: #0a1525; border: 1px solid var(--border); padding: 10px; border-radius: 8px; }
        .card h4 { margin: 0 0 8px 0; color: var(--cyan); font-size: 13px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 12px; align-items: center;}
        .val { font-weight: bold; color: var(--gold); }
        .tag { font-size: 10px; padding: 2px 5px; border-radius: 3px; background: #1c3d64; color: #fff; }
        .tag.active { background: var(--bull); color: #000; font-weight: bold; }
        .tag.warn { background: var(--bear); color: #fff; font-weight: bold; }
        .tag.special { background: var(--purple); color: #fff; font-weight: bold; }
        .btn-main { background: var(--cyan); color: #000; border: none; padding: 8px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        input { background: #050c14; border: 1px solid var(--cyan); color: #fff; padding: 6px; border-radius: 4px; width: 100px; font-size: 14px; }
        #ai-advice-box { font-size: 11px; line-height: 1.5; white-space: pre-wrap; color: #fff; background: #16263d; padding: 10px; border-radius: 4px; margin-top: 5px; border-left: 4px solid var(--cyan); }
    </style>
</head>
<body>
    <header class="topbar">
        <div style="font-weight: bold; color: var(--cyan); font-size: 14px;">🎯 MJ SNIPER AI v25.4 (形態大解讀)</div>
        <div style="display:flex; gap:8px;">
            <input type="text" id="top-tk" placeholder="代號">
            <button class="btn-main" onclick="fireSniper(document.getElementById('top-tk').value)">⚡ 射擊鑑定</button>
        </div>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <div class="card">
                <h4>📐 AI 戰略決策報告 <span id="status-tag" class="tag">READY</span></h4>
                <div class="row"><span>標的/價格：</span> <span id="cur-tk" class="val">--</span> <span id="cur-p" class="val">--</span></div>
                <div id="ai-advice-box">請輸入代號進行全方位形態分析...</div>
            </div>

            <div class="card">
                <h4>🧠 OBV 秘訣與形態掃描</h4>
                <div class="row"><span>OBV 四大秘訣：</span> <span id="obv-score" class="val">--</span> <span id="obv-sig" class="tag">--</span></div>
                <div class="row"><span>技術形態識別：</span> <span id="tech-pattern" class="tag special">--</span></div>
                <div class="row"><span>K線型態組合：</span> <span id="candle-pattern" class="tag active">--</span></div>
            </div>

            <div class="card">
                <h4>📊 指標雷達 (SMC / OFI / BB)</h4>
                <div class="row"><span>SMC 聰明錢結構：</span> <span id="mod-smc" class="tag">--</span></div>
                <div class="row"><span>OFI 訂單流失衡：</span> <span id="mod-ofi" class="tag">--</span></div>
                <div class="row"><span>RSI / 趨勢 MA：</span> <span id="mod-rsi" class="tag">--</span> <span id="mod-trend" class="tag">--</span></div>
                <div class="row"><span>布林通道狀態：</span> <span id="mod-bb" class="tag special">--</span></div>
            </div>
        </aside>
        <section id="chart"></section>
    </div>

    <script>
        let chart, series, volumeSeries, pLines = [];
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw3FtfMjvsSJB0lxXNZuW58jK9mzM6UpU4uJ8dLczWY4sIN4gl7yW9qKoi1rCc7ZA/exec".trim().replace(/\s+/g, '');

        function init() {
            chart = LightweightCharts.createChart(document.getElementById('chart'), {
                layout: { background: { color: '#000' }, textColor: '#6a8da8' },
                grid: { vertLines: { color: '#0e1f33' }, horzLines: { color: '#0e1f33' } },
                timeScale: { borderColor: '#1c3d64', timeVisible: true }
            });
            series = chart.addCandlestickSeries({ upColor: '#00e676', downColor: '#ff1744', borderVisible: false });
            volumeSeries = chart.addHistogramSeries({ color: '#26a69a', priceFormat: { type: 'volume' }, priceScaleId: '' });
            volumeSeries.priceScale().applyOptions({ scaleMargins: { top: 0.8, bottom: 0 } });
        }

        async function fireSniper(tk) {
            if(!tk) return;
            const rawSym = tk.toUpperCase();
            const sym = isNaN(rawSym) ? rawSym : rawSym + '.TW'; 
            document.getElementById('cur-tk').innerText = sym;
            try {
                const res = await fetch(`${GAS_URL}?tk=${sym}`);
                const d = await res.json();
                if(d.chart && d.chart.result) {
                    const r = d.chart.result[0];
                    const t = r.timestamp, q = r.indicators.quote[0];
                    let df = [];
                    for(let i=0; i<t.length; i++) {
                        if(q.close[i]) df.push({ time: t[i], open: q.open[i], high: q.high[i], low: q.low[i], close: q.close[i], vol: q.volume[i]||0 });
                    }
                    df.sort((a,b)=>a.time-b.time);
                    let obv = 0;
                    df = df.map((item, i) => {
                        if(i > 0) {
                            if(item.close > df[i-1].close) obv += item.vol;
                            else if(item.close < df[i-1].close) obv -= item.vol;
                        }
                        item.obv = obv; return item;
                    });
                    series.setData(df);
                    runAdvancedAnalysis(df);
                    chart.timeScale().fitContent();
                    document.getElementById('status-tag').innerText = "ONLINE";
                    document.getElementById('status-tag').style.background = "#00e676";
                }
            } catch(e) { console.error(e); }
        }

        function runAdvancedAnalysis(df) {
            const last = df[df.length-1];
            const prev = df[df.length-2];
            const p2 = df[df.length-3];

            // 1. K線型態組合解讀
            let candleP = "常態";
            const body = Math.abs(last.close - last.open);
            const lowerWick = Math.min(last.close, last.open) - last.low;
            const upperWick = last.high - Math.max(last.close, last.open);
            if(lowerWick > body * 2) candleP = "🔨 槌子線(看漲)";
            else if(upperWick > body * 2) candleP = "☄️ 射擊之星(看跌)";
            else if(last.close > prev.open && last.open < prev.close && prev.close < prev.open) candleP = "🔥 吞噬線(看漲)";
            document.getElementById('candle-pattern').innerText = candleP;

            // 2. 布林通道狀態解讀
            const ma20 = df.slice(-20).reduce((a,b)=>a+b.close,0)/20;
            const sd = Math.sqrt(df.slice(-20).reduce((a,b)=>a+Math.pow(b.close-ma20,2),0)/20);
            const ub = ma20 + 2*sd, lb = ma20 - 2*sd;
            let bbStatus = "通道內";
            if(last.close >= ub) bbStatus = "🚀 觸碰頂軌(過熱)";
            else if(last.close <= lb) bbStatus = "📉 觸碰底軌(超賣)";
            else if(sd < (ma20*0.01)) bbStatus = "🤐 通道擠壓(即將變盤)";
            document.getElementById('mod-bb').innerText = bbStatus;

            // 3. OBV 四大秘訣
            const obvEMA30 = df.slice(-30).reduce((a,b)=>a+b.obv,0)/30;
            let obvScore = 0;
            if(last.obv > obvEMA30 && prev.obv <= obvEMA30) obvScore += 5;
            if(last.close == Math.max(...df.slice(-30).map(x=>x.close)) && last.obv == Math.max(...df.slice(-30).map(x=>x.obv))) obvScore += 8;
            document.getElementById('obv-score').innerText = obvScore;
            document.getElementById('obv-sig').innerText = obvScore >= 8 ? "主力進攻" : "中性";

            // 4. 其他核心指標 (SMC / OFI / RSI)
            const isBOS = last.close > df[df.length-10].close;
            document.getElementById('mod-smc').innerText = isBOS ? "BOS(多)" : "CHOCH(空)";
            document.getElementById('mod-smc').className = `tag ${isBOS?'active':'warn'}`;
            const avgV = df.slice(-20).reduce((a,b)=>a+b.vol,0)/20;
            document.getElementById('mod-ofi').innerText = last.vol > avgV * 1.5 ? "異常大量" : "正常";
            
            let g=0, l=0;
            for(let i=df.length-14; i<df.length; i++) {
                let c = df[i].close-df[i-1].close; if(c>0) g+=c; else l-=c;
            }
            const rsi = l==0?100:100-(100/(1+(g/14)/(l/14)));
            document.getElementById('mod-rsi').innerText = `RSI:${Math.round(rsi)}`;
            document.getElementById('mod-rsi').className = `tag ${rsi<35?'active':rsi>65?'warn':''}`;

            // 5. 綜合建議
            let advice = `【MJ AI 鑑識報告】\n● 型態: ${candleP}\n● 布林: ${bbStatus}\n● OBV分數: ${obvScore}\n`;
            if(last.close <= lb && obvScore >= 5) advice += "🔥 強烈建議: 觸底+資金進場, 抄底機會!";
            else if(last.close >= ub && rsi > 70) advice += "⚠️ 警告: 觸頂+超買, 建議獲利了結!";
            document.getElementById('ai-advice-box').innerText = advice;
            document.getElementById('cur-p').innerText = `$${last.close.toFixed(2)}`;
        }
        window.onload = init;
    </script>
</body>
</html>
