<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MJ SNIPER v29.2 - DECISION COMPLETED</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg: #03080f; --panel: #070e19; --cyan: #00d4ff; --bull: #00e676; --bear: #ff1744; --border: #1c3d64; --t1: #cfe0ee; --gold: #ffd700; --purple: #bf40bf; }
        body { background: var(--bg); color: var(--t1); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .topbar { background: var(--panel); border-bottom: 2px solid var(--cyan); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .layout { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .sidebar { background: var(--panel); padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid var(--border); max-height: 70vh; }
        #chart { flex: 1; background: #000; min-height: 22vh; }
        @media (min-width: 768px) { .layout { flex-direction: row; } .sidebar { width: 445px; border-bottom: none; border-right: 1px solid var(--border); max-height: 100%; } }
        .card { background: #0a1525; border: 1px solid var(--border); padding: 10px; border-radius: 8px; }
        .card h4 { margin: 0 0 8px 0; color: var(--cyan); font-size: 13px; border-bottom: 1px solid var(--border); padding-bottom: 4px; display: flex; justify-content: space-between; }
        .decision-header { background: #1a1a00; border: 2px solid var(--gold); border-radius: 8px; padding: 12px; margin-bottom: 5px; }
        .decision-line { font-size: 13px; line-height: 1.6; color: #fff; font-weight: bold; }
        .res-box { font-size: 11px; line-height: 1.5; white-space: pre-wrap; color: #fff; background: #16263d; padding: 10px; border-radius: 4px; border-left: 4px solid var(--cyan); margin-top: 5px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 11px; align-items: center;}
        .val { font-weight: bold; color: var(--gold); }
        .tag { font-size: 10px; padding: 2px 5px; border-radius: 3px; background: #1c3d64; }
        .tag.active { background: var(--bull); color: #000; }
        .tag.warn { background: var(--bear); color: #fff; }
        .tag.macro { background: #5c3fb5; color: #fff; }
        .btn-main { background: var(--cyan); color: #000; border: none; padding: 8px 12px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        select, input { background: #050c14; border: 1px solid var(--cyan); color: #fff; padding: 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <header class="topbar">
        <div style="font-weight: bold; color: var(--cyan); font-size: 14px;">🎯 MJ SNIPER AI v29.2 (核心說明版)</div>
        <div style="display:flex; gap:6px;">
            <select id="sel-tf"><option value="1d">1D</option><option value="15m">15M</option></select>
            <input type="text" id="top-tk" placeholder="代號">
            <button class="btn-main" onclick="fireSniper(document.getElementById('top-tk').value)">⚡ 射擊鑑定</button>
        </div>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <div class="decision-header">
                <h4 style="color:var(--gold); border-bottom:1px solid var(--gold); font-size:13px; margin:0 0 5px 0;">🏁 AI 交易決策總結</h4>
                <div id="decision-summary" class="decision-line">請射擊標的進行六層鑑定...</div>
            </div>

            <div class="card" style="border-color: var(--gold);">
                <h4>🌟 項目三：智動共振決策 (核心建議)</h4>
                <div id="res-final" class="res-box" style="border-left-color: var(--gold); background: #1a1a00;">等待共振信號對齊...</div>
            </div>

            <div class="card" style="border-left: 4px solid #5c3fb5;">
                <h4>🌍 宏觀衛星與 AI 預警</h4>
                <div class="row"><span>大盤環境：</span> <span id="macro-env" class="tag macro">掃描中</span> <span>倉位上限：</span> <span id="pos-limit" class="val">--</span></div>
                <div id="macro-warn" class="res-box" style="border-left-color: #5c3fb5; background: #0e1a2b; font-size:10px;">數據同步中...</div>
            </div>

            <div class="card">
                <h4>📜 趨勢與量價鑑定 (道氏/威科夫)</h4>
                <div class="row"><span>道氏趨勢：</span> <span id="dow-trend" class="tag">--</span> <span>威科夫：</span> <span id="wyk-phase" class="tag special">--</span></div>
                <div class="res-box" id="res-trend">等待理論數據分析...</div>
            </div>

            <div class="card">
                <h4>📊 指標核心 (SMC/OBV/OFI)</h4>
                <div class="row"><span>SMC：</span> <span id="smc-val" class="tag">--</span> <span>OBV分數：</span> <span id="obv-val" class="val">--</span></div>
                <div class="row"><span>OFI：</span> <span id="ofi-score" class="val">--</span> <span>偵測型態：</span> <span id="pat-list" class="tag active">--</span></div>
            </div>

            <div class="card">
                <h4>🛡️ VaR 風控建議</h4>
                <div class="row"><span>現價：</span> <span id="cur-p" class="val">--</span> <span>停損位：</span> <span id="var-sl" class="val" style="color:var(--bear)">--</span></div>
                <div class="row"><span>風險 VaR：</span> <span id="var-val" class="tag">--</span> <span>RR 比：</span> <span class="val">1:1.25</span></div>
            </div>
        </aside>
        <section id="chart"></section>
    </div>

    <script>
        let chart, series, volumeSeries;
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw3FtfMjvsSJB0lxXNZuW58jK9mzM6UpU4uJ8dLczWY4sIN4gl7yW9qKoi1rCc7ZA/exec".trim().replace(/\s+/g, '');

        function init() {
            chart = LightweightCharts.createChart(document.getElementById('chart'), {
                layout: { background: { color: '#000' }, textColor: '#6a8da8' },
                grid: { vertLines: { color: '#0e1f33' }, horzLines: { color: '#0e1f33' } },
                timeScale: { borderColor: '#1c3d64', timeVisible: true }
            });
            series = chart.addCandlestickSeries({ upColor: '#00e676', downColor: '#ff1744', borderVisible: false });
            volumeSeries = chart.addHistogramSeries({ color: '#26a69a', priceFormat: { type: 'volume' }, priceScaleId: '' });
            volumeSeries.priceScale().applyOptions({ scaleMargins: { top: 0.8, bottom: 0 } });
        }

        async function fireSniper(tk) {
            if(!tk) return;
            const tf = document.getElementById('sel-tf').value;
            let sym = tk.toUpperCase().trim();
            if (!isNaN(sym)) { if (sym.length <= 4) sym = sym.padStart(4, '0') + ".HK"; else sym = sym + ".TW"; }
            try {
                const res = await fetch(`${GAS_URL}?tk=${sym}&interval=${tf}&range=${tf=='15m'?'5d':'1y'}`);
                const d = await res.json();
                if(d.chart && d.chart.result) {
                    const r = d.chart.result[0], t = r.timestamp, q = r.indicators.quote[0];
                    let df = [];
                    for(let i=0; i<t.length; i++) { if(q.close[i]) df.push({ time: t[i], open: q.open[i], high: q.high[i], low: q.low[i], close: q.close[i], vol: q.volume[i]||0 }); }
                    df.sort((a,b)=>a.time-b.time);
                    let obv = 0;
                    df = df.map((item, i) => { if(i > 0) { if(item.close > df[i-1].close) obv += item.vol; else if(item.close < df[i-1].close) obv -= item.vol; } item.obv = obv; return item; });
                    series.setData(df);
                    setTimeout(() => { runDecisionAI(df, sym); }, 50);
                    chart.timeScale().fitContent();
                }
            } catch(e) { console.error(e); }
        }

        function runDecisionAI(df, sym) {
            const last = df[df.length-1];
            
            // --- 指標運算 ---
            const ma60 = df.slice(-60).reduce((a,b)=>a+b.close,0)/60;
            const isBOS = last.close > df[df.length-10].close;
            const obvEMA30 = df.slice(-30).reduce((a,b)=>a+b.obv,0)/30;
            const obvScore = (last.obv > obvEMA30 ? 5 : 0) + (last.close == Math.max(...df.slice(-30).map(x=>x.close)) && last.obv == Math.max(...df.slice(-30).map(x=>x.obv)) ? 8 : 0);
            const rr = 1.25;
            const varValue = (last.close * 0.05).toFixed(1);

            // --- 🚀 項目三：核心說明補完 (不更動邏輯，補回文字) ---
            let resonanceMsg = "";
            if (obvScore >= 10 && isBOS && rr > 1.25) {
                resonanceMsg = "🌟 發現「黃金共振」勳章！\n● 主力重兵集結 (OBV > 10)\n● 技術結構突破 (SMC 為 BOS)\n● 盈虧比 (RR > 1.25) 划算\n● 操作建議：積極佈局，此交易品質極佳。";
            } else if (obvScore >= 10 && !isBOS) {
                resonanceMsg = "⚠️ 嚴重警訊：偵測到「資金與結構背離」！\n● 針對 OBV 高但結構空 (CHOCH) 的陷阱\n● 自動標記為「⚠️ 誘多/出貨」徵兆\n● 警告：VaR 風險值 $" + varValue + " 正在顯著上升。";
            } else {
                resonanceMsg = "⚖️ 目前指標尋求對齊中，等待「黃金共振」出現。";
            }
            document.getElementById('res-final').innerText = resonanceMsg;

            // --- 其他模組 UI 更新 (完整保留) ---
            document.getElementById('dow-trend').innerText = last.close > ma60 ? "多頭" : "空頭";
            const support = Math.min(...df.slice(-30, -5).map(x=>x.low));
            const isSpring = last.low < support && last.close > support;
            document.getElementById('wyk-phase').innerText = isSpring ? "Phase C" : "Phase B/D";
            document.getElementById('res-trend').innerText = `【道氏】格局:${last.close > ma60?'多頭':'空頭'} | 【威科夫】階段:${isSpring?'C':'B/D'}`;
            document.getElementById('smc-val').innerText = isBOS ? "BOS" : "CHOCH";
            document.getElementById('obv-val').innerText = obvScore;
            document.getElementById('ofi-score').innerText = (last.close > df[df.length-2].close ? 10 : -10);
            document.getElementById('pat-list').innerText = isBOS ? "📈趨勢確認" : "常態";

            // 一站式決策摘要
            const totalScore = (isBOS?20:0) + (obvScore*4) + (last.close > ma60 ? 20 : 0);
            const sl = (last.close * 0.934).toFixed(2);
            const t1 = (last.close * 1.082).toFixed(2);
            document.getElementById('decision-summary').innerHTML = 
                `<span style="color:${totalScore>=60?'var(--bull)':'var(--gold)'};">${totalScore>=60?'【買入】':'【觀察】'}</span> | ${totalScore>=75?'積極進場':'建議等待不急進場'}<br>` +
                `現價 ${last.close.toFixed(2)} 停損 ${sl} T1=${t1} RR=1:1.25<br>` +
                `<span style="color:var(--cyan);">(3/4層通過 分數 ${totalScore}/100)</span>`;

            document.getElementById('cur-p').innerText = last.close.toFixed(2);
            document.getElementById('var-sl').innerText = sl;
            document.getElementById('var-val').innerText = `$${varValue}`;
            document.getElementById('macro-env').innerText = last.close > ma60 ? "WEAK_BULL ✓" : "CAUTION ⚠";
            document.getElementById('pos-limit').innerText = last.close > ma60 ? "50-70%" : "20-30%";
        }
        window.onload = init;
    </script>
</body>
</html>
