<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MJ SNIPER AI v16.0 — 數據對齊版</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg: #050c14; --panel: #070e19; --cyan: #00d4ff; --bull: #00e676; --bear: #ff1744; --border: #1c3d64; --t1: #cfe0ee; --gold: #ffd700; }
        body { background: var(--bg); color: var(--t1); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .topbar { background: var(--panel); border-bottom: 2px solid var(--cyan); padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .layout { flex: 1; display: grid; grid-template-columns: 340px 1fr; gap: 1px; background: var(--border); overflow: hidden; }
        .sidebar { background: var(--panel); padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        #chart { background: #000; position: relative; }
        .card { background: #0a1525; border: 1px solid var(--border); padding: 10px; border-radius: 8px; }
        .card h4 { margin: 0 0 8px 0; color: var(--cyan); font-size: 13px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; }
        input { background: #050c14; border: 1px solid var(--cyan); color: #fff; padding: 6px; border-radius: 4px; }
        .btn-main { background: var(--cyan); color: #000; border: none; padding: 8px 12px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .val { font-weight: bold; color: var(--gold); }
        .bull { color: var(--bull); } .bear { color: var(--bear); }
        .source-tag { font-size: 10px; padding: 2px 4px; border-radius: 3px; background: #1c3d64; }
    </style>
</head>
<body>
    <header class="topbar">
        <div style="font-weight: bold; color: var(--cyan);">🎯 MJ SNIPER AI v16.0</div>
        <div style="display:flex; gap:8px;">
            <input type="text" id="top-tk" placeholder="2330.TW" style="width:100px;">
            <button class="btn-main" onclick="loadMultiSource(document.getElementById('top-tk').value)">⚡ 鑑識</button>
        </div>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <div class="card">
                <h4>📐 L6 核心評分與風控</h4>
                <div class="row"><span>數據來源：</span> <span id="data-src" class="source-tag">--</span></div>
                <div class="row"><span>AI 結論：</span> <span id="l6-sig" class="val">--</span></div>
                <div class="row"><span>進場位：</span> <span id="en-p">--</span></div>
                <div class="row"><span>止損位：</span> <span id="sl-p" class="bear">--</span></div>
                <div class="row"><span>目標位：</span> <span id="tp-p" class="bull">--</span></div>
            </div>

            <div class="card">
                <h4>📡 全域雷達</h4>
                <textarea id="watchlist" style="width:100%; background:#070e19; color:var(--cyan); height:40px; border-radius:4px; font-size:11px;">2330.TW, NVDA, AAPL</textarea>
                <button class="btn-main" style="width:100%; margin-top:5px;" onclick="startScanner()">⚡ 啟動掃描</button>
                <div id="scanner-list" style="margin-top:5px; font-size:12px;"></div>
            </div>
        </aside>
        <section id="chart"></section>
    </div>

    <script>
        let chart, series, pLines = [];
        const KEYS = {
            FINNHUB: 'd4sg251r01qvsjbhhgn0d4sg251r01qvsjbhhgng',
            ALPHA: 'JRV6HWQ13Q6PHG4C',
            FLASK: 'http://127.0.0.1:5000/api/kline'
        };

        function init() {
            chart = LightweightCharts.createChart(document.getElementById('chart'), {
                layout: { background: { color: '#000' }, textColor: '#6a8da8' },
                grid: { vertLines: { color: '#0e1f33' }, horzLines: { color: '#0e1f33' } }
            });
            series = chart.addCandlestickSeries({ upColor: '#00e676', downColor: '#ff1744' });
        }

        async function loadMultiSource(tk) {
            if(!tk) return;
            const cleanTk = tk.toUpperCase();
            document.getElementById('data-src').innerText = "正在切換源...";
            
            // 優先權 1: 本地 Flask (Yahoo 數據)
            try {
                const res = await fetch(`${KEYS.FLASK}?tk=${cleanTk}&tf=15m&bars=100`);
                const json = await res.json();
                if(json.data && json.data.length > 0) {
                    renderChart(json.data, "Yahoo (Local)");
                    return;
                }
            } catch(e) { console.log("Flask Server 未開啟或失敗"); }

            // 優先權 2: Finnhub
            try {
                const res = await fetch(`https://finnhub.io/api/v1/stock/candle?symbol=${cleanTk.split('.')[0]}&resolution=15&from=${Math.floor(Date.now()/1000)-259200}&to=${Math.floor(Date.now()/1000)}&token=${KEYS.FINNHUB}`);
                const d = await res.json();
                if(d.s === 'ok') {
                    const df = d.t.map((t, i) => ({ time: t, open: d.o[i], high: d.h[i], low: d.l[i], close: d.c[i] }));
                    renderChart(df, "Finnhub (Cloud)");
                    return;
                }
            } catch(e) { console.log("Finnhub 失敗"); }

            alert("所有數據源均失敗，請確認代碼或 Flask 狀態。");
        }

        function renderChart(df, srcName) {
            series.setData(df);
            document.getElementById('data-src').innerText = srcName;
            
            // 更新風控 (RR 1:2)
            const last = df[df.length-1];
            const entry = last.close;
            const stop = Math.min(...df.slice(-10).map(x => x.low));
            const target = entry + (entry - stop) * 2;
            
            document.getElementById('en-p').innerText = entry.toFixed(2);
            document.getElementById('sl-p').innerText = stop.toFixed(2);
            document.getElementById('tp-p').innerText = target.toFixed(2);
            document.getElementById('l6-sig').innerText = entry > stop ? "⚡ 買入" : "觀望";

            pLines.forEach(l => series.removePriceLine(l));
            pLines = [
                series.createPriceLine({ price: entry, color: '#00d4ff', lineWidth: 2, title: 'ENTRY' }),
                series.createPriceLine({ price: stop, color: '#ff1744', lineWidth: 2, title: 'STOP' }),
                series.createPriceLine({ price: target, color: '#00e676', lineWidth: 2, title: 'TARGET' })
            ];
            chart.timeScale().fitContent();
        }

        async function startScanner() {
            const list = document.getElementById('watchlist').value.split(',').map(s => s.trim());
            const display = document.getElementById('scanner-list');
            display.innerHTML = "";
            for (let tk of list) {
                const item = document.createElement('div');
                item.style.padding = "5px";
                item.innerHTML = `<span>${tk}</span> <span style="cursor:pointer; color:var(--cyan)" onclick="loadMultiSource('${tk}')">[ 載入 ]</span>`;
                display.appendChild(item);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
