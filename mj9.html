<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MJ SNIPER v20.0 - ULTIMATE</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg: #050c14; --panel: #070e19; --cyan: #00d4ff; --bull: #00e676; --bear: #ff1744; --border: #1c3d64; }
        body { background: var(--bg); color: #cfe0ee; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .topbar { background: var(--panel); border-bottom: 2px solid var(--cyan); padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .layout { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #chart { flex: 2; background: #000; min-height: 40vh; }
        .sidebar { flex: 1; background: var(--panel); padding: 15px; overflow-y: auto; border-top: 1px solid var(--border); }
        .card { background: #0a1525; border: 1px solid var(--border); padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        .btn-main { background: var(--cyan); color: #000; border: none; padding: 12px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; font-size: 14px; }
        input { background: #050c14; border: 1px solid var(--cyan); color: #fff; padding: 8px; border-radius: 4px; width: 100px; }
        .val { font-weight: bold; color: #ffd700; }
        @media (min-width: 768px) { .layout { flex-direction: row; } .sidebar { width: 340px; flex: none; border-top: none; border-left: 1px solid var(--border); } }
    </style>
</head>
<body>
    <header class="topbar">
        <div style="font-weight: bold; color: var(--cyan);">🎯 MJ SNIPER v20.0</div>
        <div style="display:flex; gap:8px;">
            <input type="text" id="top-tk" placeholder="NVDA">
            <button class="btn-main" style="width:auto; padding:5px 15px;" onclick="fetchData(document.getElementById('top-tk').value)">⚡ 鑑識</button>
        </div>
    </header>

    <div class="layout">
        <section id="chart"></section>
        <aside class="sidebar">
            <div class="card">
                <h4>📐 雲端分析面板</h4>
                <div id="stat-msg" style="color:#ffd700; font-size:12px; margin-bottom:8px;">系統就緒</div>
                <div style="display:flex; justify-content:space-between;"><span>現價：</span><span id="cur-p" class="val">--</span></div>
                <div style="display:flex; justify-content:space-between;"><span>止損：</span><span id="sl-p" style="color:var(--bear)">--</span></div>
                <div style="display:flex; justify-content:space-between;"><span>目標：</span><span id="tp-p" style="color:var(--bull)">--</span></div>
            </div>
            <div class="card">
                <button class="btn-main" onclick="fetchData('NVDA')">測試 NVDA (美股)</button>
                <button class="btn-main" style="margin-top:8px; background:#fff;" onclick="fetchData('AAPL')">測試 AAPL (美股)</button>
            </div>
        </aside>
    </div>

    <script>
        let chart, series;
        const KEY = 'JRV6HWQ13Q6PHG4C'; // Alpha Vantage 專屬金鑰

        function init() {
            chart = LightweightCharts.createChart(document.getElementById('chart'), {
                layout: { background: { color: '#000' }, textColor: '#6a8da8' },
                grid: { vertLines: { color: '#0e1f33' }, horzLines: { color: '#0e1f33' } }
            });
            series = chart.addCandlestickSeries({ upColor: '#00e676', downColor: '#ff1744' });
        }

        async function fetchData(tk) {
            if(!tk) return;
            const sym = tk.toUpperCase();
            document.getElementById('stat-msg').innerText = `🔄 正在抓取 ${sym}...`;
            
            try {
                // 使用 Alpha Vantage 獲取 15 分鐘 K 線
                const url = `https://www.alphavantage.co/query?function=TIME_SERIES_INTRADAY&symbol=${sym}&interval=15min&apikey=${KEY}`;
                const res = await fetch(url);
                const d = await res.json();
                
                const timeSeries = d["Time Series (15min)"];
                if(timeSeries) {
                    const df = Object.keys(timeSeries).map(t => ({
                        time: new Date(t).getTime() / 1000,
                        open: parseFloat(timeSeries[t]["1. open"]),
                        high: parseFloat(timeSeries[t]["2. high"]),
                        low: parseFloat(timeSeries[t]["3. low"]),
                        close: parseFloat(timeSeries[t]["4. close"])
                    })).sort((a,b) => a.time - b.time);
                    
                    series.setData(df);
                    updateRR(df);
                    chart.timeScale().fitContent();
                    document.getElementById('stat-msg').innerText = "✅ 載入成功";
                } else {
                    document.getElementById('stat-msg').innerText = "❌ 失敗：API 點數耗盡或標的不支援";
                }
            } catch(e) { document.getElementById('stat-msg').innerText = "❌ 連線異常"; }
        }

        function updateRR(df) {
            const last = df[df.length-1];
            const stop = Math.min(...df.slice(-10).map(x => x.low));
            const target = last.close + (last.close - stop) * 1.5;
            document.getElementById('cur-p').innerText = last.close.toFixed(2);
            document.getElementById('sl-p').innerText = stop.toFixed(2);
            document.getElementById('tp-p').innerText = target.toFixed(2);
        }

        window.onload = init;
    </script>
</body>
</html>
