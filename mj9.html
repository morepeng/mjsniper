<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MJ SNIPER v28.7 - DECISION STRATEGY</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg: #03080f; --panel: #070e19; --cyan: #00d4ff; --bull: #00e676; --bear: #ff1744; --border: #1c3d64; --t1: #cfe0ee; --gold: #ffd700; --purple: #bf40bf; }
        body { background: var(--bg); color: var(--t1); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .topbar { background: var(--panel); border-bottom: 2px solid var(--cyan); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .layout { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .sidebar { background: var(--panel); padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid var(--border); max-height: 62vh; }
        #chart { flex: 1; background: #000; min-height: 25vh; }
        @media (min-width: 768px) { .layout { flex-direction: row; } .sidebar { width: 420px; border-bottom: none; border-right: 1px solid var(--border); max-height: 100%; } }
        .card { background: #0a1525; border: 1px solid var(--border); padding: 10px; border-radius: 8px; }
        .card h4 { margin: 0 0 8px 0; color: var(--cyan); font-size: 13px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
        .decision-header { background: #1a1a00; border: 2px solid var(--gold); border-radius: 8px; padding: 12px; margin-bottom: 8px; }
        .decision-line { font-size: 12px; line-height: 1.6; color: #fff; font-weight: bold; }
        .res-box { font-size: 11px; line-height: 1.5; white-space: pre-wrap; color: #fff; background: #16263d; padding: 10px; border-radius: 4px; border-left: 4px solid var(--cyan); margin-top: 5px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 12px; }
        .val { font-weight: bold; color: var(--gold); }
        .tag { font-size: 10px; padding: 2px 5px; border-radius: 3px; background: #1c3d64; }
        .tag.active { background: var(--bull); color: #000; }
        .tag.warn { background: var(--bear); color: #fff; }
        .btn-main { background: var(--cyan); color: #000; border: none; padding: 8px 12px; font-weight: bold; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <header class="topbar">
        <div style="font-weight: bold; color: var(--cyan); font-size: 14px;">🎯 MJ SNIPER AI v28.7 (交易決策版)</div>
        <div style="display:flex; gap:6px;">
            <select id="sel-tf" style="background:#050c14; color:#fff; border:1px solid var(--cyan); border-radius:4px;"><option value="1d">1D</option><option value="15m">15M</option></select>
            <input type="text" id="top-tk" placeholder="代號" style="background:#050c14; color:#fff; border:1px solid var(--cyan); border-radius:4px; width:80px;">
            <button class="btn-main" onclick="fireSniper(document.getElementById('top-tk').value)">⚡ 射擊</button>
        </div>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <div class="decision-header">
                <h4 style="color:var(--gold); border-bottom:1px solid var(--gold);">🏁 AI 交易決策總覽</h4>
                <div id="decision-summary" class="decision-line">請射擊標的進行鑑定...</div>
            </div>

            <div class="card" style="border-color: var(--cyan);">
                <h4>🌟 項目三：實戰共振決策</h4>
                <div id="res-final" class="res-box" style="border-left-color: var(--gold); background: #142236;">等待全球聯動數據...</div>
            </div>

            <div class="card">
                <h4>📈 趨勢與量價共振 (道氏/威科夫)</h4>
                <div class="row"><span>道氏/SMC：</span> <span id="dow-trend" class="tag">--</span> <span id="smc-val" class="tag">--</span></div>
                <div class="row"><span>威科夫階段：</span> <span id="wyk-phase" class="tag">--</span> <span>OBV：</span> <span id="obv-val" class="val">--</span></div>
                <div class="res-box" id="res-trend">鑑定準備中...</div>
            </div>

            <div class="card">
                <h4>🛡️ VaR 風控數據</h4>
                <div class="row"><span>現價：</span> <span id="cur-p" class="val">--</span> <span>停損：</span> <span id="var-sl" class="val" style="color:var(--bear)">--</span></div>
                <div class="row"><span>目標 T1：</span> <span id="var-t1" class="val" style="color:var(--bull)">--</span> <span>RR：</span> <span class="val">1:1.25</span></div>
            </div>
        </aside>
        <section id="chart"></section>
    </div>

    <script>
        let chart, series, volumeSeries;
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw3FtfMjvsSJB0lxXNZuW58jK9mzM6UpU4uJ8dLczWY4sIN4gl7yW9qKoi1rCc7ZA/exec".trim().replace(/\s+/g, '');

        function init() {
            chart = LightweightCharts.createChart(document.getElementById('chart'), {
                layout: { background: { color: '#000' }, textColor: '#6a8da8' },
                grid: { vertLines: { color: '#0e1f33' }, horzLines: { color: '#0e1f33' } },
                timeScale: { borderColor: '#1c3d64', timeVisible: true }
            });
            series = chart.addCandlestickSeries({ upColor: '#00e676', downColor: '#ff1744', borderVisible: false });
            volumeSeries = chart.addHistogramSeries({ color: '#26a69a', priceFormat: { type: 'volume' }, priceScaleId: '' });
            volumeSeries.priceScale().applyOptions({ scaleMargins: { top: 0.8, bottom: 0 } });
        }

        async function fireSniper(tk) {
            if(!tk) return;
            const tf = document.getElementById('sel-tf').value;
            let sym = tk.toUpperCase().trim();
            if (!isNaN(sym)) { if (sym.length <= 4) sym = sym.padStart(4, '0') + ".HK"; else sym = sym + ".TW"; }
            try {
                const res = await fetch(`${GAS_URL}?tk=${sym}&interval=${tf}&range=${tf=='15m'?'5d':'1y'}`);
                const d = await res.json();
                if(d.chart && d.chart.result) {
                    const r = d.chart.result[0], t = r.timestamp, q = r.indicators.quote[0];
                    let df = [];
                    for(let i=0; i<t.length; i++) { if(q.close[i]) df.push({ time: t[i], open: q.open[i], high: q.high[i], low: q.low[i], close: q.close[i], vol: q.volume[i]||0 }); }
                    df.sort((a,b)=>a.time-b.time);
                    let obv = 0;
                    df = df.map((item, i) => { if(i > 0) { if(item.close > df[i-1].close) obv += item.vol; else if(item.close < df[i-1].close) obv -= item.vol; } item.obv = obv; return item; });
                    series.setData(df);
                    setTimeout(() => runDecisionVersion(df, tf), 50);
                    chart.timeScale().fitContent();
                }
            } catch(e) { console.error(e); }
        }

        function runDecisionVersion(df, tf) {
            const last = df[df.length-1], prev = df[df.length-2];
            
            // --- 基礎分析數據 ---
            const isBOS = last.close > df[df.length-10].close;
            const obvEMA30 = df.slice(-30).reduce((a,b)=>a+b.obv,0)/30;
            const obvScore = (last.obv > obvEMA30 ? 5 : 0) + (last.close == Math.max(...df.slice(-30).map(x=>x.close)) && last.obv == Math.max(...df.slice(-30).map(x=>x.obv)) ? 8 : 0);
            const dowTrend = last.close > df.slice(-60).reduce((a,b)=>a+b.close,0)/60 ? "多頭" : "空頭";
            
            const sl = (last.close * 0.934).toFixed(2); // 模擬 -6.6% 停損
            const t1 = (last.close * 1.082).toFixed(2); // 模擬 +8.2% 目標
            const totalScore = (isBOS?20:0) + (obvScore*4) + (dowTrend=="多頭"?20:0);
            const passCount = (isBOS?1:0) + (obvScore>=5?1:0) + (dowTrend=="多頭"?1:0) + 1; // 基礎+指標

            // --- 🚀 核心 UI：交易決策摘要展示 ---
            const action = totalScore >= 60 ? "【買入】" : totalScore >= 40 ? "【觀察】" : "【避開】";
            const timing = totalScore >= 75 ? "積極進場" : totalScore >= 60 ? "建議等待不急進場" : "觀望為主";
            const color = totalScore >= 60 ? "var(--bull)" : totalScore >= 40 ? "var(--gold)" : "var(--bear)";

            document.getElementById('decision-summary').innerHTML = 
                `<span style="color:${color}; font-size:16px;">${action}</span> | ${timing}<br>` +
                `現價 ${last.close.toFixed(2)} 停損 ${sl}(-6.6%) T1=${t1}(+8.2%) RR=1:1.25<br>` +
                `<span style="color:var(--cyan);">(${passCount}/4層通過 分數${totalScore}/100)</span>`;

            // --- 其他模組同步更新 ---
            document.getElementById('dow-trend').innerText = dowTrend;
            document.getElementById('smc-val').innerText = isBOS ? "BOS" : "CHOCH";
            document.getElementById('obv-val').innerText = obvScore;
            document.getElementById('res-final').innerText = (totalScore >= 60 && isBOS) ? "🌟 發現「黃金共振」！資金與結構對齊。" : "等待共振信號中...";
            document.getElementById('cur-p').innerText = last.close.toFixed(2);
            document.getElementById('var-sl').innerText = sl;
            document.getElementById('var-t1').innerText = t1;
        }
        window.onload = init;
    </script>
</body>
</html>
