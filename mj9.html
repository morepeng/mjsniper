<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MJ SNIPER v28.5 - RESONANCE MASTER</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg: #03080f; --panel: #070e19; --cyan: #00d4ff; --bull: #00e676; --bear: #ff1744; --border: #1c3d64; --t1: #cfe0ee; --gold: #ffd700; --purple: #bf40bf; }
        body { background: var(--bg); color: var(--t1); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .topbar { background: var(--panel); border-bottom: 2px solid var(--cyan); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .layout { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .sidebar { background: var(--panel); padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid var(--border); max-height: 55vh; }
        #chart { flex: 1; background: #000; min-height: 35vh; }
        @media (min-width: 768px) { .layout { flex-direction: row; } .sidebar { width: 410px; border-bottom: none; border-right: 1px solid var(--border); max-height: 100%; } }
        .card { background: #0a1525; border: 1px solid var(--border); padding: 10px; border-radius: 8px; }
        .card h4 { margin: 0 0 8px 0; color: var(--cyan); font-size: 13px; border-bottom: 1px solid var(--border); padding-bottom: 4px; display: flex; justify-content: space-between; }
        .row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 12px; align-items: center;}
        .val { font-weight: bold; color: var(--gold); }
        .tag { font-size: 10px; padding: 2px 5px; border-radius: 3px; background: #1c3d64; color: #fff; }
        .tag.active { background: var(--bull); color: #000; font-weight: bold; }
        .tag.warn { background: var(--bear); color: #fff; font-weight: bold; }
        .res-box { font-size: 11px; line-height: 1.5; white-space: pre-wrap; color: #fff; background: #16263d; padding: 10px; border-radius: 4px; border-left: 4px solid var(--gold); margin-top: 5px; }
        .btn-main { background: var(--cyan); color: #000; border: none; padding: 8px 12px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        select, input { background: #050c14; border: 1px solid var(--cyan); color: #fff; padding: 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <header class="topbar">
        <div style="font-weight: bold; color: var(--cyan); font-size: 14px;">🎯 MJ SNIPER AI v28.5 (共振決策版)</div>
        <div style="display:flex; gap:6px;">
            <select id="sel-tf"><option value="1d">1D</option><option value="15m">15M</option></select>
            <input type="text" id="top-tk" placeholder="代號">
            <button class="btn-main" onclick="fireSniper(document.getElementById('top-tk').value)">⚡ 射擊</button>
        </div>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <div class="card">
                <h4>📈 項目一：趨勢共振鑑定 (道氏/OFI/SMC)</h4>
                <div class="row"><span>道氏趨勢：</span> <span id="dow-trend" class="tag">--</span> <span>OFI 評分：</span> <span id="ofi-val" class="val">--</span></div>
                <div class="row"><span>SMC 結構：</span> <span id="smc-val" class="tag">--</span></div>
                <div class="res-box" id="res-trend">等待趨勢鑑定數據...</div>
            </div>

            <div class="card">
                <h4>💎 項目二：量價共振鑑定 (威科夫/SMC/OBV)</h4>
                <div class="row"><span>威科夫階段：</span> <span id="wyk-phase" class="tag">--</span> <span>OBV 分數：</span> <span id="obv-val" class="val">--</span></div>
                <div class="row"><span>VSA 狀態：</span> <span id="vsa-val" class="val">--</span></div>
                <div class="res-box" id="res-vsa" style="border-left-color: var(--purple);">等待量價鑑定數據...</div>
            </div>

            <div class="card">
                <h4>🛡️ VaR 風控與型態鑑定</h4>
                <div class="row"><span>建議停損：</span> <span id="var-sl" class="val" style="color:var(--bear)">--</span> <span>風險 VaR：</span> <span id="var-val" class="tag">--</span></div>
                <div class="row"><span>偵測型態：</span> <span id="pat-list" class="tag active">--</span></div>
            </div>
        </aside>
        <section id="chart"></section>
    </div>

    <script>
        let chart, series, volumeSeries;
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw3FtfMjvsSJB0lxXNZuW58jK9mzM6UpU4uJ8dLczWY4sIN4gl7yW9qKoi1rCc7ZA/exec".trim().replace(/\s+/g, '');

        function init() {
            chart = LightweightCharts.createChart(document.getElementById('chart'), {
                layout: { background: { color: '#000' }, textColor: '#6a8da8' },
                grid: { vertLines: { color: '#0e1f33' }, horzLines: { color: '#0e1f33' } },
                timeScale: { borderColor: '#1c3d64', timeVisible: true }
            });
            series = chart.addCandlestickSeries({ upColor: '#00e676', downColor: '#ff1744', borderVisible: false });
            volumeSeries = chart.addHistogramSeries({ color: '#26a69a', priceFormat: { type: 'volume' }, priceScaleId: '' });
            volumeSeries.priceScale().applyOptions({ scaleMargins: { top: 0.8, bottom: 0 } });
        }

        async function fireSniper(tk) {
            if(!tk) return;
            const tf = document.getElementById('sel-tf').value;
            let sym = tk.toUpperCase().trim();
            if (!isNaN(sym)) { if (sym.length <= 4) sym = sym.padStart(4, '0') + ".HK"; else sym = sym + ".TW"; }
            try {
                const res = await fetch(`${GAS_URL}?tk=${sym}&interval=${tf}&range=${tf=='15m'?'5d':'1y'}`);
                const d = await res.json();
                if(d.chart && d.chart.result) {
                    const r = d.chart.result[0], t = r.timestamp, q = r.indicators.quote[0];
                    let df = [];
                    for(let i=0; i<t.length; i++) { if(q.close[i]) df.push({ time: t[i], open: q.open[i], high: q.high[i], low: q.low[i], close: q.close[i], vol: q.volume[i]||0 }); }
                    df.sort((a,b)=>a.time-b.time);
                    let obv = 0;
                    df = df.map((item, i) => { if(i > 0) { if(item.close > df[i-1].close) obv += item.vol; else if(item.close < df[i-1].close) obv -= item.vol; } item.obv = obv; return item; });
                    series.setData(df);
                    setTimeout(() => runDualResonance(df), 50);
                    chart.timeScale().fitContent();
                }
            } catch(e) { console.error(e); }
        }

        function runDualResonance(df) {
            const last = df[df.length-1], prev = df[df.length-2];
            
            // --- 運算邏輯 ---
            const isBOS = last.close > df[df.length-10].close;
            const obvEMA30 = df.slice(-30).reduce((a,b)=>a+b.obv,0)/30;
            const obvScore = (last.obv > obvEMA30 ? 5 : 0) + (last.close == Math.max(...df.slice(-30).map(x=>x.close)) && last.obv == Math.max(...df.slice(-30).map(x=>x.obv)) ? 8 : 0);
            
            // 項目一：趨勢共振 (道氏 + OFI + SMC)
            const dowTrend = last.close > df.slice(-60).reduce((a,b)=>a+b.close,0)/60 ? "多頭" : "空頭";
            const ofiScore = last.vol > df.slice(-20).reduce((a,b)=>a+b.vol,0)/20 * 1.5 ? 10 : 0;
            
            document.getElementById('dow-trend').innerText = dowTrend;
            document.getElementById('dow-trend').className = `tag ${dowTrend=="多頭"?'active':'warn'}`;
            document.getElementById('ofi-val').innerText = ofiScore;
            document.getElementById('smc-val').innerText = isBOS ? "BOS" : "CHOCH";
            
            let resTrend = `【趨勢建議】\n`;
            if(dowTrend == "多頭" && isBOS && ofiScore > 0) resTrend += "🌟 黃金趨勢共振！主力強力推升中。";
            else if(dowTrend == "多頭") resTrend += "👍 趨勢偏多，等待結構突破確認。";
            else resTrend += "⚠️ 趨勢偏空，不建議逆勢操作。";
            document.getElementById('res-trend').innerText = resTrend;

            // 項目二：量價共振 (威科夫 + SMC + OBV)
            const support = Math.min(...df.slice(-30, -5).map(x=>x.low));
            const isSpring = last.low < support && last.close > support;
            const wykPhase = isSpring ? "C" : (last.close > Math.max(...df.slice(-30).map(x=>x.high)) ? "D" : "B");
            
            document.getElementById('wyk-phase').innerText = `Phase ${wykPhase}`;
            document.getElementById('obv-val').innerText = obvScore;
            document.getElementById('vsa-val').innerText = isSpring ? "Spring(彈簧)" : "正常";
            
            let resVsa = `【量價建議】\n`;
            if(isSpring && obvScore >= 5) resVsa += "🔥 威科夫彈簧共振！主力低位吸籌完成。";
            else if(obvScore >= 10) resVsa += "💰 資金高度集結，留意突破機會。";
            else resVsa += "⚖️ 量能平衡，觀察吸籌區間。";
            document.getElementById('res-vsa').innerText = resVsa;

            // 風控
            document.getElementById('var-sl').innerText = (last.close * 0.95).toFixed(2);
            document.getElementById('var-val').innerText = `$${(last.close * 0.05).toFixed(1)}`;
        }
        window.onload = init;
    </script>
</body>
</html>
