<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MJ SNIPER v28.2 - DUAL TIMEFRAME</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg: #03080f; --panel: #070e19; --cyan: #00d4ff; --bull: #00e676; --bear: #ff1744; --border: #1c3d64; --t1: #cfe0ee; --gold: #ffd700; --purple: #bf40bf; }
        body { background: var(--bg); color: var(--t1); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .topbar { background: var(--panel); border-bottom: 2px solid var(--cyan); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .layout { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .sidebar { background: var(--panel); padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid var(--border); max-height: 55vh; }
        #chart { flex: 1; background: #000; min-height: 35vh; }
        @media (min-width: 768px) { .layout { flex-direction: row; } .sidebar { width: 395px; border-bottom: none; border-right: 1px solid var(--border); max-height: 100%; } }
        .card { background: #0a1525; border: 1px solid var(--border); padding: 10px; border-radius: 8px; }
        .card h4 { margin: 0 0 8px 0; color: var(--cyan); font-size: 13px; border-bottom: 1px solid var(--border); padding-bottom: 4px; display: flex; justify-content: space-between; }
        .row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 12px; align-items: center;}
        .val { font-weight: bold; color: var(--gold); }
        .tag { font-size: 10px; padding: 2px 5px; border-radius: 3px; background: #1c3d64; color: #fff; }
        .tag.active { background: var(--bull); color: #000; font-weight: bold; }
        .tag.warn { background: var(--bear); color: #fff; font-weight: bold; }
        .tag.special { background: var(--purple); color: #fff; font-weight: bold; }
        .btn-main { background: var(--cyan); color: #000; border: none; padding: 8px 12px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        select { background: #050c14; border: 1px solid var(--cyan); color: #fff; padding: 6px; border-radius: 4px; font-size: 13px; cursor: pointer; }
        input { background: #050c14; border: 1px solid var(--cyan); color: #fff; padding: 6px; border-radius: 4px; width: 90px; font-size: 14px; }
        .report-box { font-size: 11px; line-height: 1.5; white-space: pre-wrap; color: #fff; background: #16263d; padding: 10px; border-radius: 4px; border-left: 4px solid var(--cyan); }
    </style>
</head>
<body>
    <header class="topbar">
        <div style="font-weight: bold; color: var(--cyan); font-size: 14px;">🎯 MJ SNIPER AI v28.2 (雙週期旗艦)</div>
        <div style="display:flex; gap:6px; align-items:center;">
            <select id="sel-tf">
                <option value="1d">日線 (1D)</option>
                <option value="15m">15分鐘 (15M)</option>
            </select>
            <input type="text" id="top-tk" placeholder="代號">
            <button class="btn-main" onclick="fireSniper(document.getElementById('top-tk').value)">⚡ 射擊</button>
        </div>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <div class="card">
                <h4>📐 綜合戰略報告 <span id="status-tag" class="tag">READY</span></h4>
                <div class="row"><span>鑑識標的：</span> <span id="cur-tk" class="val">--</span> <span id="cur-p" class="val">--</span></div>
                <div class="report-box" id="ai-advice-box">請選擇週期並射擊鑑定...</div>
            </div>

            <div class="card">
                <h4>🛡️ VaR 風控矩陣 (<span id="cur-tf-label">日線</span>)</h4>
                <div class="row"><span>建議停損位：</span> <span id="var-sl" class="bear" style="color:var(--bear)">--</span></div>
                <div class="row"><span>目標 T1 / T2：</span> <span id="var-t1" class="bull" style="color:var(--bull)">--</span> / <span id="var-t2" class="bull" style="color:var(--bull)">--</span></div>
                <div class="row"><span>RR 比 / 凱利：</span> <span id="var-rr" class="val">1:1.25</span> / <span id="var-kelly" class="val">5.5%</span></div>
                <div class="row"><span>VaR 風險值：</span> <span id="var-95" class="tag special">--</span></div>
            </div>

            <div class="card">
                <h4>🧠 OBV 秘訣與專家型態</h4>
                <div class="row"><span>OBV 分數：</span> <span id="obv-score" class="val">--</span> <span id="obv-sig" class="tag">--</span></div>
                <div class="row"><span>型態淨評分：</span> <span id="pat-score" class="val">--</span> <span id="pat-conf" class="tag">--</span></div>
                <div class="row"><span>偵測型態：</span> <span id="pat-list" class="tag active">--</span></div>
            </div>

            <div class="card">
                <h4>📊 結構指標雷達 (SMC / OFI / BB)</h4>
                <div class="row"><span>SMC 結構：</span> <span id="mod-smc" class="tag">--</span> <span id="mod-bb" class="tag special">--</span></div>
                <div class="row"><span>OFI 訂單流：</span> <span id="mod-ofi" class="tag">--</span> <span id="mod-rsi" class="tag">--</span></div>
            </div>
        </aside>
        <section id="chart"></section>
    </div>

    <script>
        let chart, series, volumeSeries, pLines = [];
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw3FtfMjvsSJB0lxXNZuW58jK9mzM6UpU4uJ8dLczWY4sIN4gl7yW9qKoi1rCc7ZA/exec".trim().replace(/\s+/g, '');

        function init() {
            chart = LightweightCharts.createChart(document.getElementById('chart'), {
                layout: { background: { color: '#000' }, textColor: '#6a8da8' },
                grid: { vertLines: { color: '#0e1f33' }, horzLines: { color: '#0e1f33' } },
                timeScale: { borderColor: '#1c3d64', timeVisible: true }
            });
            series = chart.addCandlestickSeries({ upColor: '#00e676', downColor: '#ff1744', borderVisible: false });
            volumeSeries = chart.addHistogramSeries({ color: '#26a69a', priceFormat: { type: 'volume' }, priceScaleId: '' });
            volumeSeries.priceScale().applyOptions({ scaleMargins: { top: 0.8, bottom: 0 } });
        }

        async function fireSniper(tk) {
            if(!tk) return;
            const tf = document.getElementById('sel-tf').value;
            document.getElementById('cur-tf-label').innerText = tf == '1d' ? '日線' : '15分鐘';
            
            let sym = tk.toUpperCase().trim();
            if (!isNaN(sym)) {
                if (sym.length <= 4) sym = sym.padStart(4, '0') + ".HK";
                else sym = sym + ".TW";
            }
            document.getElementById('cur-tk').innerText = sym;
            
            try {
                // 根據週期決定請求參數：15m 則抓取 5 天內的數據，1d 則抓取 1 年
                const range = tf == '15m' ? '5d' : '1y';
                const res = await fetch(`${GAS_URL}?tk=${sym}&interval=${tf}&range=${range}`);
                const d = await res.json();
                
                if(d.chart && d.chart.result) {
                    const r = d.chart.result[0];
                    const t = r.timestamp, q = r.indicators.quote[0];
                    let df = [];
                    for(let i=0; i<t.length; i++) {
                        if(q.close[i]) df.push({ time: t[i], open: q.open[i], high: q.high[i], low: q.low[i], close: q.close[i], vol: q.volume[i]||0 });
                    }
                    df.sort((a,b)=>a.time-b.time);
                    let obv = 0;
                    df = df.map((item, i) => {
                        if(i > 0) { if(item.close > df[i-1].close) obv += item.vol; else if(item.close < df[i-1].close) obv -= item.vol; }
                        item.obv = obv; return item;
                    });
                    series.setData(df);
                    setTimeout(() => runResonanceEngine(df, tf), 50);
                    chart.timeScale().fitContent();
                    document.getElementById('status-tag').innerText = "ONLINE";
                    document.getElementById('status-tag').style.background = "#00e676";
                }
            } catch(e) { console.error(e); }
        }

        function runResonanceEngine(df, tf) {
            const last = df[df.length-1], prev = df[df.length-2];
            
            // 1. OBV 評分 (對應週期)
            const obvEMA30 = df.slice(-30).reduce((a,b)=>a+b.obv,0)/30;
            let obvScore = 0;
            if(last.obv > obvEMA30) obvScore += 5;
            if(last.close == Math.max(...df.slice(-30).map(x=>x.close)) && last.obv == Math.max(...df.slice(-30).map(x=>x.obv))) obvScore += 8;
            document.getElementById('obv-score').innerText = obvScore;
            document.getElementById('obv-sig').innerText = obvScore >= 10 ? "重兵集結" : "中性";

            // 2. SMC / OFI / BB
            const isBOS = last.close > df[df.length-10].close;
            document.getElementById('mod-smc').innerText = isBOS ? "BOS(多方)" : "CHOCH(空方)";
            document.getElementById('mod-smc').className = `tag ${isBOS?'active':'warn'}`;
            const avgV = df.slice(-20).reduce((a,b)=>a+b.vol,0)/20;
            document.getElementById('mod-ofi').innerText = last.vol > avgV * 1.5 ? "大量吸籌" : "正常";
            
            // 3. VaR 風控
            let atrSum = 0; for(let i=df.length-14; i<df.length; i++) { atrSum += (df[i].high - df[i].low); }
            const atr = atrSum / 14;
            const sl = last.close - (atr * 2);
            document.getElementById('var-sl').innerText = sl.toFixed(2);
            document.getElementById('var-t1').innerText = (last.close + (last.close-sl)*1.25).toFixed(2);
            document.getElementById('var-t2').innerText = (last.close + (last.close-sl)*2.5).toFixed(2);
            document.getElementById('var-95').innerText = `$${(last.close * 0.05).toFixed(1)}`;

            // 4. 黃金共振判定 (植入智動決策核心)
            let report = `【MJ ${tf == '1d' ? '趨勢' : '當沖'}共振鑑定】\n`;
            const isResonance = obvScore >= 10 && isBOS;
            
            if(isResonance) {
                report += `🌟 發現「黃金共振」！\n● 週期: ${tf}\n● 資金重兵 + 結構突破\n建議：順勢操作，此級別勝率極高。`;
            } else if(obvScore >= 10 && !isBOS) {
                report += `⚠️ 警訊：資金與結構背離！\n● 疑似主力誘多或盤整出貨\n● 建議觀望，等待結構 BOS。`;
            } else {
                report += `● OBV分數: ${obvScore} | 結構: ${isBOS?'多':'空'}\n● 狀態：目前指標尚未對齊。`;
            }
            
            document.getElementById('ai-advice-box').innerText = report;
            document.getElementById('cur-p').innerText = `$${last.close.toFixed(2)}`;
            document.getElementById('pat-list').innerText = isBOS ? "趨勢確認" : "等待確認";
        }
        window.onload = init;
    </script>
</body>
</html>
