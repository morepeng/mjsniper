<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MJ SNIPER v25.1 - MOBILE ULTIMATE</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg: #050c14; --panel: #070e19; --cyan: #00d4ff; --bull: #00e676; --bear: #ff1744; --border: #1c3d64; --t1: #cfe0ee; --gold: #ffd700; }
        body { background: var(--bg); color: var(--t1); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .topbar { background: var(--panel); border-bottom: 2px solid var(--cyan); padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .layout { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .sidebar { background: var(--panel); padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid var(--border); max-height: 48vh; }
        #chart { flex: 1; background: #000; position: relative; min-height: 40vh; }
        @media (min-width: 768px) { .layout { flex-direction: row; } .sidebar { width: 340px; border-bottom: none; border-right: 1px solid var(--border); max-height: 100%; } }
        .card { background: #0a1525; border: 1px solid var(--border); padding: 10px; border-radius: 8px; }
        .card h4 { margin: 0 0 8px 0; color: var(--cyan); font-size: 13px; border-bottom: 1px solid var(--border); padding-bottom: 4px; display: flex; justify-content: space-between; }
        .row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 12px; align-items: center;}
        .val { font-weight: bold; color: var(--gold); }
        .tag { font-size: 10px; padding: 2px 5px; border-radius: 3px; background: #1c3d64; color: #fff; }
        .tag.active { background: var(--bull); color: #000; font-weight: bold; }
        .tag.warn { background: var(--bear); color: #fff; font-weight: bold; }
        .btn-main { background: var(--cyan); color: #000; border: none; padding: 8px; font-weight: bold; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        input { background: #050c14; border: 1px solid var(--cyan); color: #fff; padding: 6px; border-radius: 4px; width: 80px; }
    </style>
</head>
<body>
    <header class="topbar">
        <div style="font-weight: bold; color: var(--cyan); font-size: 14px;">🎯 MJ SNIPER AI v25.1</div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="top-tk" placeholder="2330">
            <button class="btn-main" style="width:auto;" onclick="fireSniper(document.getElementById('top-tk').value)">⚡ 射擊</button>
        </div>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <div class="card">
                <h4>📐 AI 戰略面板 <span id="status-tag" class="tag">READY</span></h4>
                <div class="row"><span>目標標的：</span> <span id="cur-tk" class="val">--</span></div>
                <div class="row"><span>AI 結論：</span> <span id="ai-msg" style="color:var(--cyan); font-weight:bold; font-size:14px;">等待鑑識...</span></div>
                <div style="margin: 8px 0; border-top: 1px dashed var(--border);"></div>
                <div class="row"><span>進場 / 止損：</span> <span class="val" id="cur-p">--</span> <span class="tag warn" id="sl-p">--</span></div>
                <div class="row"><span>預期目標 (TP)：</span> <span class="tag active" id="tp-p">--</span></div>
            </div>

            <div class="card">
                <h4>🧠 狙擊模組雷達 (JavaScript 內核)</h4>
                <div class="row"><span>趨勢 MA / 布林：</span> <span id="mod-trend" class="tag">--</span> <span id="mod-bb" class="tag">--</span></div>
                <div class="row"><span>SMC 結構 / OFI：</span> <span id="mod-smc" class="tag">--</span> <span id="mod-ofi" class="tag">--</span></div>
                <div class="row"><span>RSI 強弱 / OBV：</span> <span id="mod-rsi" class="tag">--</span> <span id="mod-obv" class="tag">--</span></div>
            </div>

            <div class="card" style="display:grid; grid-template-columns: 1fr 1fr; gap:6px;">
                <button class="btn-main" style="background:#fff;" onclick="fireSniper('NVDA')">NVDA</button>
                <button class="btn-main" style="background:#fff;" onclick="fireSniper('MSFT')">MSFT</button>
                <button class="btn-main" onclick="fireSniper('2330')">2330(台)</button>
                <button class="btn-main" onclick="fireSniper('2317')">2317(台)</button>
            </div>
        </aside>
        <section id="chart"></section>
    </div>

    <script>
        let chart, series, volumeSeries, pLines = [];
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw3FtfMjvsSJB0lxXNZuW58jK9mzM6UpU4uJ8dLczWY4sIN4gl7yW9qKoi1rCc7ZA/exec".trim().replace(/\s+/g, '');

        function init() {
            chart = LightweightCharts.createChart(document.getElementById('chart'), {
                layout: { background: { color: '#000' }, textColor: '#6a8da8' },
                grid: { vertLines: { color: '#0e1f33' }, horzLines: { color: '#0e1f33' } },
                timeScale: { borderColor: '#1c3d64', timeVisible: true }
            });
            series = chart.addCandlestickSeries({ upColor: '#00e676', downColor: '#ff1744', borderVisible: false });
            volumeSeries = chart.addHistogramSeries({ color: '#26a69a', priceFormat: { type: 'volume' }, priceScaleId: '' });
            volumeSeries.priceScale().applyOptions({ scaleMargins: { top: 0.8, bottom: 0 } });
        }

        async function fireSniper(tk) {
            if(!tk) return;
            const rawSym = tk.toUpperCase();
            const sym = isNaN(rawSym) ? rawSym : rawSym + '.TW'; 
            document.getElementById('cur-tk').innerText = sym;
            document.getElementById('status-tag').innerText = "雲端擷取...";
            
            try {
                const res = await fetch(`${GAS_URL}?tk=${sym}`);
                const d = await res.json();
                if(d.chart && d.chart.result) {
                    const r = d.chart.result[0];
                    const t = r.timestamp, q = r.indicators.quote[0];
                    let raw = [];
                    for(let i=0; i<t.length; i++) {
                        if(q.close[i]) raw.push({ time: t[i], open: q.open[i], high: q.high[i], low: q.low[i], close: q.close[i], vol: q.volume[i]||0 });
                    }
                    raw.sort((a,b)=>a.time-b.time);
                    let df = [], volData = [], seen = new Set();
                    for(let item of raw) {
                        if(!seen.has(item.time)) {
                            seen.add(item.time);
                            df.push({ time: item.time, open: item.open, high: item.high, low: item.low, close: item.close });
                            volData.push({ time: item.time, value: item.vol, color: item.close>=item.open?'rgba(0,230,118,0.3)':'rgba(255,23,68,0.3)' });
                        }
                    }
                    series.setData(df); volumeSeries.setData(volData);
                    runDecisionAI(df, volData);
                    chart.timeScale().fitContent();
                    document.getElementById('status-tag').innerText = "ONLINE";
                    document.getElementById('status-tag').style.background = "var(--bull)";
                }
            } catch(e) { document.getElementById('status-tag').innerText = "ERROR"; }
        }

        function runDecisionAI(df, volData) {
            if(df.length < 30) return;
            const last = df[df.length-1];
            let score = 0;

            // 1. MA 趨勢
            const getMA = (p) => df.slice(-p).reduce((a,b)=>a+b.close,0)/p;
            const ma20 = getMA(20), ma5 = getMA(5);
            const trend = last.close > ma20 ? "多頭" : "空頭";
            document.getElementById('mod-trend').innerText = trend;
            document.getElementById('mod-trend').className = `tag ${trend=="多頭"?'active':'warn'}`;
            score += (trend=="多頭"?1:-1);

            // 2. 布林通道估算
            const sd = Math.sqrt(df.slice(-20).reduce((a,b)=>a+Math.pow(b.close-ma20,2),0)/20);
            const bbL = ma20 - 2*sd, bbU = ma20 + 2*sd;
            if(last.close <= bbL) { document.getElementById('mod-bb').innerText = "觸底"; document.getElementById('mod-bb').className="tag active"; score+=2; }
            else if(last.close >= bbU) { document.getElementById('mod-bb').innerText = "觸頂"; document.getElementById('mod-bb').className="tag warn"; score-=2; }
            else { document.getElementById('mod-bb').innerText = "常態"; document.getElementById('mod-bb').className="tag"; }

            // 3. RSI 估算
            let g=0, l=0;
            for(let i=df.length-14; i<df.length; i++) {
                let c = df[i].close - df[i-1].close;
                if(c>0) g+=c; else l-=c;
            }
            const rsi = l==0?100:100-(100/(1+(g/14)/(l/14)));
            document.getElementById('mod-rsi').innerText = `RSI:${Math.round(rsi)}`;
            document.getElementById('mod-rsi').className = `tag ${rsi<30?'active':rsi>70?'warn':''}`;

            // 4. SMC / OFI / OBV
            const isBOS = last.close > df[df.length-10].close;
            document.getElementById('mod-smc').innerText = isBOS?"BOS(多)":"CHOCH(空)";
            document.getElementById('mod-smc').className = `tag ${isBOS?'active':'warn'}`;
            
            const avgV = volData.slice(-20).reduce((a,b)=>a+b.value,0)/20;
            const isOFI = volData[volData.length-2].value > avgV*1.5;
            document.getElementById('mod-ofi').innerText = isOFI?"異常量":"正常";
            document.getElementById('mod-ofi').className = `tag ${isOFI?'active':''}`;

            // AI 結論
            const msg = score>=2?"🟢 強烈買進":score>=0?"↗️ 偏多":"🔴 避開/減碼";
            document.getElementById('ai-msg').innerText = msg;
            document.getElementById('ai-msg').style.color = score>=2?"var(--bull)":score<0?"var(--bear)":"var(--gold)";

            const sl = Math.min(...df.slice(-15).map(x=>x.low));
            document.getElementById('cur-p').innerText = last.close.toFixed(2);
            document.getElementById('sl-p').innerText = sl.toFixed(2);
            document.getElementById('tp-p').innerText = (last.close + (last.close-sl)*1.5).toFixed(2);

            pLines.forEach(l => series.removePriceLine(l));
            pLines = [series.createPriceLine({price:last.close, color:'#00d4ff', lineStyle:2, title:'進場'})];
        }
        window.onload = init;
    </script>
</body>
</html>
