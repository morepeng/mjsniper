<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MJ SNIPER v23.1 - PRIVATE SATELLITE</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg: #050c14; --panel: #070e19; --cyan: #00d4ff; --bull: #00e676; --bear: #ff1744; --border: #1c3d64; }
        body { background: var(--bg); color: #cfe0ee; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .topbar { background: var(--panel); border-bottom: 2px solid var(--cyan); padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .layout { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #chart { flex: 2; background: #000; min-height: 40vh; }
        .sidebar { flex: 1; background: var(--panel); padding: 15px; overflow-y: auto; border-top: 1px solid var(--border); }
        .card { background: #0a1525; border: 1px solid var(--border); padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        .btn-main { background: var(--cyan); color: #000; border: none; padding: 10px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; font-size: 13px; margin-top: 5px; }
        input { background: #050c14; border: 1px solid var(--cyan); color: #fff; padding: 8px; border-radius: 4px; width: 80px; }
        .val { font-weight: bold; color: #ffd700; }
        @media (min-width: 768px) { .layout { flex-direction: row; } .sidebar { width: 340px; flex: none; border-top: none; border-left: 1px solid var(--border); } }
    </style>
</head>
<body>
    <header class="topbar">
        <div style="font-weight: bold; color: var(--cyan);">🎯 MJ SNIPER v23.1 (防呆版)</div>
        <div style="display:flex; gap:8px;">
            <input type="text" id="top-tk" placeholder="2330">
            <button class="btn-main" style="width:auto; padding:5px 15px; margin:0;" onclick="fetchPrivateCloud(document.getElementById('top-tk').value)">⚡ 鑑識</button>
        </div>
    </header>

    <div class="layout">
        <section id="chart"></section>
        <aside class="sidebar">
            <div class="card">
                <h4>📐 Google 衛星直連引擎</h4>
                <div id="stat-msg" style="color:#ffd700; font-size:12px; margin-bottom:8px;">🟢 私人衛星已就緒</div>
                <div style="display:flex; justify-content:space-between;"><span>標的：</span><span id="cur-tk" class="val">--</span></div>
                <div style="display:flex; justify-content:space-between;"><span>現價：</span><span id="cur-p">--</span></div>
                <div style="display:flex; justify-content:space-between;"><span>止損：</span><span id="sl-p" style="color:var(--bear)">--</span></div>
                <div style="display:flex; justify-content:space-between;"><span>目標：</span><span id="tp-p" style="color:var(--bull)">--</span></div>
            </div>
            <div class="card">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                    <button class="btn-main" onclick="fetchPrivateCloud('NVDA')">NVDA (美)</button>
                    <button class="btn-main" onclick="fetchPrivateCloud('TSLA')">TSLA (美)</button>
                    <button class="btn-main" style="background:#fff;" onclick="fetchPrivateCloud('2330')">2330 (台)</button>
                    <button class="btn-main" style="background:#fff;" onclick="fetchPrivateCloud('2317')">2317 (台)</button>
                </div>
            </div>
        </aside>
    </div>

    <script>
        let chart, series;
        
        // 👇👇👇 請在這裡貼上您的 Google 網址 👇👇👇
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw3FtfMjvsSJB0lxXNZuW58jK9mzM6UpU4uJ8dLczWY4sIN4gl7yW9qKoi1rCc7ZA/exec";
        function init() {
            chart = LightweightCharts.createChart(document.getElementById('chart'), {
                layout: { background: { color: '#000' }, textColor: '#6a8da8' },
                grid: { vertLines: { color: '#0e1f33' }, horzLines: { color: '#0e1f33' } },
                timeScale: { borderColor: '#1c3d64', timeVisible: true }
            });
            series = chart.addCandlestickSeries({ upColor: '#00e676', downColor: '#ff1744' });
        }

        async function fetchPrivateCloud(tk) {
            if(!tk) return;
            
            // 防呆機制：檢查是否忘記貼網址
            if(GAS_URL.includes("👉")) {
                alert("🛑 系統錯誤：您還沒有貼上 Google 衛星網址！\n請用記事本打開 mj9.html，找到 GAS_URL 並替換成您的專屬網址。");
                return;
            }

            const rawSym = tk.toUpperCase();
            const sym = isNaN(rawSym) ? rawSym : rawSym + '.TW'; 
            
            document.getElementById('stat-msg').innerText = `🔄 呼叫 Google 衛星抓取 ${sym}...`;
            document.getElementById('stat-msg').style.color = "#00d4ff";
            document.getElementById('cur-tk').innerText = sym;
            
            try {
                const url = `${GAS_URL}?tk=${sym}`;
                const res = await fetch(url);
                const d = await res.json();
                
                if(d.chart && d.chart.result && d.chart.result.length > 0) {
                    const r = d.chart.result[0];
                    const t = r.timestamp;
                    const q = r.indicators.quote[0];
                    const df = [];
                    
                    for(let i=0; i<t.length; i++) {
                        if(q.close[i] !== null) { 
                            df.push({ time: t[i], open: q.open[i], high: q.high[i], low: q.low[i], close: q.close[i] });
                        }
                    }
                    
                    series.setData(df);
                    updateStats(df);
                    chart.timeScale().fitContent();
                    document.getElementById('stat-msg').innerText = "✅ 衛星數據回傳成功！";
                    document.getElementById('stat-msg').style.color = "#00e676";
                } else {
                    document.getElementById('stat-msg').innerText = "❌ 查無標的或非開盤時間";
                    document.getElementById('stat-msg').style.color = "#ff1744";
                }
            } catch(e) { 
                console.error(e);
                document.getElementById('stat-msg').innerText = "❌ 連線失敗，請檢查網址是否正確";
                document.getElementById('stat-msg').style.color = "#ff1744";
            }
        }

        function updateStats(df) {
            if(!df || df.length === 0) return;
            const last = df[df.length-1];
            const stop = Math.min(...df.slice(-10).map(x => x.low));
            const target = last.close + (last.close - stop) * 1.5;
            document.getElementById('cur-p').innerText = last.close.toFixed(2);
            document.getElementById('sl-p').innerText = stop.toFixed(2);
            document.getElementById('tp-p').innerText = target.toFixed(2);
        }

        window.onload = init;
    </script>
</body>
</html>
